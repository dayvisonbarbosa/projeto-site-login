<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Site para login</title>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
    <link rel="stylesheet" href="estilos/style.css">
    <link rel="stylesheet" href="estilos/media-queries.css">
</head>
<body>
    <header>
        <h1>Ciência e Tecnologia</h1>
        <div id="pheader">
            <p>Conecte-se</p>
            <p>Experimente</p>
            <p>Network</p>
        </div>
    </header>
    <section>
        <main>
            <section id="borda">
                <div id="formulario">
                    <h1>Login</h1>
                    <p>Seja bem vindo(a) de volta! Por favor, faça login para continuar.</p>
                    <form action="login.php" method="post" autocomplete="on">
                        <div class="campo">
                            <span class="material-symbols-outlined">Person</span>
                            <input type="email" name="login" id="ilogin" placeholder="seu e-mail" autocomplete="email" required maxlength="30">
                            <label for="ilogin">Login</label>
                        </div>
                
                        <div class="campo">
                             <span class="material-symbols-outlined">Vpn_Key</span>
                             <input type="password" name="senha" id="isenha" placeholder="sua senha"  autocomplete="current-password" required minlength="8" maxlength="15">
                            <label for="isenha">Senha</label>
                        </div>
                        <input type="submit" value="Entrar">
                        <a href="esqueci.html">
                            Esqueci a senha
                        </a>
                    </form>
                </div>
            </section>
        </main>
    </section>
</body>
</html>
