<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Site para login</title>
    <link rel="stylesheet" href="estilos/style.css">
    <link rel="stylesheet" href="estilos/media-queries.css">
</head>
<body>
    <section>
        <header>
            <h1>Ciência e Tecnologia</h1>
            <p>Tudo em um só lugar!</p>
        </header>
        <main>
            <div id="formulario">
                <h1>Login</h1>
                <p>Seja bem vindo(a) de volta! Por favor, faça login para continuar.</p>
                <form action="login.php" method="post" autocomplete="on">
                    <div class="campo">
                        <input type="email" name="login" id="ilogin" placeholder="seu e-mail" autocomplete="email" required maxlength="30">
                        <label for="ilogin">Login</label>
                    </div>
                    
                    <div class="campo">
                        <input type="password" name="senha" id="isenha" placeholder="sua senha"  autocomplete="current-password" required minlength="8" maxlength="15">
                        <label for="isenha">Senha</label>
                    </div>

                    <input type="submit" value="Entrar">

                    <a href="esqueci.html">
                        Esqueci a senha
                    </a>
                </form>
            </div>
        </main>
    </section>   
</body>
</html>
